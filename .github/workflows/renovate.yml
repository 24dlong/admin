name: Renovate

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Generate Github Token
        uses: actions/create-github-app-token@v3
        id: github-token
        with:
          client-id: ${{ vars.RENOVATE_GITHUB_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}

      - name: Generate Private Registry Token
        id: npm-token
        run: |
            echo "token=$(aws codeartifact get-authorization-token \
            --domain ${{ inputs.AWS_CODE_ARTIFACT_DOMAIN }} \
            --domain-owner ${{ inputs.AWS_ACCOUNT_ID }} \
            --query authorizationToken \
            --output text)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.4
        env:
          RENOVATE_TOKEN: ${{ steps.github-token.outputs.token }}
          CODEARTIFACT_AUTH_TOKEN: ${{ steps.npm-token.outputs.token }}
